<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#11100e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mileage">
    <meta name="application-name" content="Mileage">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/static/icons/mileage-logger-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>Sign In</title>
    <style>
      {% include "styles.css" %}
    </style>
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel" aria-label="Sign in">
        <form action="/login" method="post" class="login-form">
          <input type="hidden" name="next_url" value="{{ next_url }}">
          <label>
            Username
            <input type="text" name="username" autocomplete="username" required autofocus>
          </label>
          <label>
            Password
            <input type="password" name="password" autocomplete="current-password" required>
          </label>
          {% if login_error %}
          <p class="form-error">{{ login_error }}</p>
          {% endif %}
          <button type="submit">Continue</button>
        </form>
      </section>
    </main>
    <script>
      if ("serviceWorker" in navigator && window.isSecureContext) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js", { scope: "/" }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
