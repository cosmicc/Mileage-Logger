<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#11100e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mileage Logger">
    <meta name="application-name" content="Mileage Logger">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/static/icons/mileage-logger-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>Mileage Logger</title>
    <style>
      {% include "styles.css" %}
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand" aria-label="Mileage Logger">
        <span class="brand-mark" aria-hidden="true">
          <img src="/static/icons/mileage-logger-icon.svg" alt="" width="34" height="34">
        </span>
        <span>Mileage Logger</span>
      </div>
      <div class="topbar-actions">
        <nav>
          <a href="/">Home</a>
          <a href="/trips">Trips</a>
          <a href="/waypoints">Waypoints</a>
          <a href="/diagnostics">Diagnostics</a>
          {% if web_login_enabled() %}
          <form action="/logout" method="post" class="nav-form">
            <button type="submit" class="nav-logout">Logout</button>
          </form>
          {% endif %}
        </nav>
      </div>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    <script>
      if ("serviceWorker" in navigator && window.isSecureContext) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js", { scope: "/" }).catch(() => {});
        });
      }

    </script>
  </body>
</html>
