{% extends "layout.html" %}
{% block content %}
<section
  class="dashboard-loading-shell"
  data-dashboard-content-url="{{ dashboard_content_url }}"
  aria-busy="true"
>
  <div class="loading-overlay-card" role="status" aria-live="polite">
    <span class="loading-spinner" aria-hidden="true"></span>
    <div>
      <h1>Dashboard</h1>
      <p>Loading mileage totals, reimbursement details, and recent work trips.</p>
    </div>
  </div>
</section>
<noscript>
  <section class="panel">
    <h2>JavaScript Required</h2>
    <p>The Dashboard loads its calculated summary after the initial page opens.</p>
  </section>
</noscript>
<script>
  (() => {
    const shell = document.querySelector(".dashboard-loading-shell");
    if (!shell) {
      return;
    }
    const contentUrl = shell.dataset.dashboardContentUrl;
    const renderError = () => {
      shell.setAttribute("aria-busy", "false");
      shell.innerHTML = `
        <section class="panel">
          <h2>Dashboard Could Not Load</h2>
          <p class="panel-meta">Refresh the page to try loading the Dashboard again.</p>
        </section>
      `;
    };
    fetch(contentUrl, {
      credentials: "same-origin",
      headers: { "X-Requested-With": "fetch" },
      cache: "no-store",
    })
      .then((response) => {
        if (response.headers.get("X-Mileage-Logger-Limp-Mode") === "true") {
          window.location.replace("/login");
          return "";
        }
        if (!response.ok) {
          throw new Error(`Dashboard content request failed: ${response.status}`);
        }
        return response.text();
      })
      .then((html) => {
        if (!html) {
          return;
        }
        shell.setAttribute("aria-busy", "false");
        shell.outerHTML = html;
      })
      .catch(renderError);
  })();
</script>
{% endblock %}
