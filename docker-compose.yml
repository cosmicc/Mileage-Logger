services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mileage_logger}
      POSTGRES_USER: ${POSTGRES_USER:-mileage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mileage}
      TZ: "${LOCAL_TIMEZONE:-America/Detroit}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      APP_NAME: "${APP_NAME:-Mileage Logger}"
      APP_ENV: "${APP_ENV:-production}"
      SECRET_KEY: "${SECRET_KEY:-change-me}"
      LOCAL_TIMEZONE: "${LOCAL_TIMEZONE:-America/Detroit}"
      TZ: "${LOCAL_TIMEZONE:-America/Detroit}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      CREATE_TABLES_ON_STARTUP: "${CREATE_TABLES_ON_STARTUP:-false}"
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://mileage:mileage@postgres:5432/mileage_logger}"
      OWNTRACKS_API_TOKEN: "${OWNTRACKS_API_TOKEN:-}"
      OWNTRACKS_USERNAME: "${OWNTRACKS_USERNAME:-owntracks}"
      OWNTRACKS_PASSWORD: "${OWNTRACKS_PASSWORD:-}"
      OWNTRACKS_SYNC_WAYPOINTS: "${OWNTRACKS_SYNC_WAYPOINTS:-true}"
      OWNTRACKS_DEFAULT_SITE_RADIUS_M: "${OWNTRACKS_DEFAULT_SITE_RADIUS_M:-150}"
      AUTOMATIC_TRIP_PROCESSING_ENABLED: "${AUTOMATIC_TRIP_PROCESSING_ENABLED:-true}"
      AUTOMATIC_TRIP_PROCESSING_INTERVAL_SECONDS: "${AUTOMATIC_TRIP_PROCESSING_INTERVAL_SECONDS:-60}"
      MQTT_ENABLED: "${MQTT_ENABLED:-false}"
      MQTT_HOST: "${MQTT_HOST:-localhost}"
      MQTT_PORT: "${MQTT_PORT:-1883}"
      MQTT_USERNAME: "${MQTT_USERNAME:-}"
      MQTT_PASSWORD: "${MQTT_PASSWORD:-}"
      MQTT_TOPIC: "${MQTT_TOPIC:-owntracks/#}"
      GAS_PRICE_STATE: "${GAS_PRICE_STATE:-MI}"
      GAS_PRICE_BUFFER: "${GAS_PRICE_BUFFER:-0.50}"
      GAS_PRICE_SOURCE: "${GAS_PRICE_SOURCE:-aaa_current}"
      EIA_API_KEY: "${EIA_API_KEY:-}"
      EIA_SERIES_ID: "${EIA_SERIES_ID:-}"
      VEHICLE_MPG: "${VEHICLE_MPG:-25.0}"
      SMARTCAR_ENABLED: "${SMARTCAR_ENABLED:-false}"
      SMARTCAR_MANAGEMENT_TOKEN: "${SMARTCAR_MANAGEMENT_TOKEN:-}"
      SMARTCAR_API_POLLING_ENABLED: "${SMARTCAR_API_POLLING_ENABLED:-false}"
      SMARTCAR_ACCESS_TOKEN: "${SMARTCAR_ACCESS_TOKEN:-}"
      SMARTCAR_CLIENT_ID: "${SMARTCAR_CLIENT_ID:-}"
      SMARTCAR_CLIENT_SECRET: "${SMARTCAR_CLIENT_SECRET:-}"
      SMARTCAR_TOKEN_URL: "${SMARTCAR_TOKEN_URL:-https://iam.smartcar.com/oauth2/token}"
      SMARTCAR_SCOPE: "${SMARTCAR_SCOPE:-read_odometer}"
      SMARTCAR_VEHICLE_ID: "${SMARTCAR_VEHICLE_ID:-}"
      SMARTCAR_API_BASE_URL: "${SMARTCAR_API_BASE_URL:-https://api.smartcar.com/v2.0}"
      SMARTCAR_ODOMETER_UNIT: "${SMARTCAR_ODOMETER_UNIT:-km}"
      SMARTCAR_TIMEOUT_SECONDS: "${SMARTCAR_TIMEOUT_SECONDS:-20}"
      SMARTCAR_RETRY_ATTEMPTS: "${SMARTCAR_RETRY_ATTEMPTS:-3}"
      SMARTCAR_RETRY_DELAY_SECONDS: "${SMARTCAR_RETRY_DELAY_SECONDS:-2}"
      SMARTCAR_AUTH_FAILURE_COOLDOWN_SECONDS: "${SMARTCAR_AUTH_FAILURE_COOLDOWN_SECONDS:-3600}"
      SMARTCAR_WEBHOOK_MAX_BODY_BYTES: "${SMARTCAR_WEBHOOK_MAX_BODY_BYTES:-262144}"
      LOG_DIR: /data/logs
    volumes:
      - logs_data:/data/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      WEB_ALLOWED_CIDRS: "${WEB_ALLOWED_CIDRS:-}"
      TZ: "${LOCAL_TIMEZONE:-America/Detroit}"
    depends_on:
      app:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - cloudflare
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TUNNEL_TOKEN:-}"
      TUNNEL_LOGLEVEL: "${CLOUDFLARED_LOG_LEVEL:-info}"
      TUNNEL_METRICS: "${CLOUDFLARED_METRICS:-}"
      TUNNEL_TRANSPORT_PROTOCOL: "${CLOUDFLARED_TRANSPORT_PROTOCOL:-auto}"
      TZ: "${LOCAL_TIMEZONE:-America/Detroit}"
    depends_on:
      nginx:
        condition: service_started

  gas-snapshot:
    build: .
    restart: unless-stopped
    environment:
      APP_NAME: "${APP_NAME:-Mileage Logger}"
      APP_ENV: "${APP_ENV:-production}"
      SECRET_KEY: "${SECRET_KEY:-change-me}"
      LOCAL_TIMEZONE: "${LOCAL_TIMEZONE:-America/Detroit}"
      TZ: "${LOCAL_TIMEZONE:-America/Detroit}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      CREATE_TABLES_ON_STARTUP: "${CREATE_TABLES_ON_STARTUP:-false}"
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://mileage:mileage@postgres:5432/mileage_logger}"
      OWNTRACKS_API_TOKEN: "${OWNTRACKS_API_TOKEN:-}"
      OWNTRACKS_USERNAME: "${OWNTRACKS_USERNAME:-owntracks}"
      OWNTRACKS_PASSWORD: "${OWNTRACKS_PASSWORD:-}"
      OWNTRACKS_SYNC_WAYPOINTS: "${OWNTRACKS_SYNC_WAYPOINTS:-true}"
      OWNTRACKS_DEFAULT_SITE_RADIUS_M: "${OWNTRACKS_DEFAULT_SITE_RADIUS_M:-150}"
      MQTT_ENABLED: "false"
      MQTT_HOST: "${MQTT_HOST:-localhost}"
      MQTT_PORT: "${MQTT_PORT:-1883}"
      MQTT_USERNAME: "${MQTT_USERNAME:-}"
      MQTT_PASSWORD: "${MQTT_PASSWORD:-}"
      MQTT_TOPIC: "${MQTT_TOPIC:-owntracks/#}"
      GAS_PRICE_STATE: "${GAS_PRICE_STATE:-MI}"
      GAS_PRICE_BUFFER: "${GAS_PRICE_BUFFER:-0.50}"
      GAS_PRICE_SOURCE: "${GAS_PRICE_SOURCE:-aaa_current}"
      EIA_API_KEY: "${EIA_API_KEY:-}"
      EIA_SERIES_ID: "${EIA_SERIES_ID:-}"
      VEHICLE_MPG: "${VEHICLE_MPG:-25.0}"
      GAS_SNAPSHOT_INTERVAL_SECONDS: "${GAS_SNAPSHOT_INTERVAL_SECONDS:-86400}"
      GAS_SNAPSHOT_RUN_ON_STARTUP: "${GAS_SNAPSHOT_RUN_ON_STARTUP:-true}"
      LOG_DIR: /data/logs
      RUN_MIGRATIONS: "false"
    volumes:
      - logs_data:/data/logs
    depends_on:
      app:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/gas-snapshot-loop"]

volumes:
  postgres_data:
  logs_data:
