services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mileage_logger}
      POSTGRES_USER: ${POSTGRES_USER:-mileage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mileage}
      TZ: "${LOCAL_TIMEZONE:-America/Detroit}"
    volumes:
      # Persistent database storage. Rebuilds and container recreates keep this volume;
      # changing the Compose/Portainer stack name or using `down -v` creates/removes data.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      APP_NAME: "${APP_NAME:-Mileage Logger}"
      APP_ENV: "${APP_ENV:-production}"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be set; run scripts/init_docker_env.sh or set a unique random value}"
      LOCAL_TIMEZONE: "${LOCAL_TIMEZONE:-America/Detroit}"
      TZ: "${LOCAL_TIMEZONE:-America/Detroit}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      WEB_LOGIN_USERNAME: "${WEB_LOGIN_USERNAME:?WEB_LOGIN_USERNAME must be set for production}"
      WEB_LOGIN_PASSWORD: "${WEB_LOGIN_PASSWORD:?WEB_LOGIN_PASSWORD must be set for production}"
      WEB_SESSION_COOKIE_SECURE: "${WEB_SESSION_COOKIE_SECURE:-false}"
      WEB_LOGIN_MAX_ATTEMPTS: "${WEB_LOGIN_MAX_ATTEMPTS:-5}"
      WEB_LOGIN_LOCKOUT_SECONDS: "${WEB_LOGIN_LOCKOUT_SECONDS:-300}"
      PASSKEY_RP_NAME: "${PASSKEY_RP_NAME:-Mileage Logger}"
      PASSKEY_RP_ID: "${PASSKEY_RP_ID:-}"
      PASSKEY_ORIGIN: "${PASSKEY_ORIGIN:-}"
      CLOUDFLARE_IP_BLOCKING_ENABLED: "${CLOUDFLARE_IP_BLOCKING_ENABLED:-false}"
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN:-}"
      CLOUDFLARE_ZONE_ID: "${CLOUDFLARE_ZONE_ID:-}"
      CLOUDFLARE_IP_BLOCK_ALLOWLIST: "${CLOUDFLARE_IP_BLOCK_ALLOWLIST:-}"
      CLOUDFLARE_AUTO_BLOCK_FAILED_LOGIN_ATTEMPTS: "${CLOUDFLARE_AUTO_BLOCK_FAILED_LOGIN_ATTEMPTS:-5}"
      WEB_API_KEY: "${WEB_API_KEY:?WEB_API_KEY must be set for non-OwnTracks API access}"
      CREATE_TABLES_ON_STARTUP: "${CREATE_TABLES_ON_STARTUP:-false}"
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://mileage:mileage@postgres:5432/mileage_logger}"
      OWNTRACKS_USERNAME: "${OWNTRACKS_USERNAME:?OWNTRACKS_USERNAME must be set for OwnTracks Basic Auth}"
      OWNTRACKS_PASSWORD: "${OWNTRACKS_PASSWORD:?OWNTRACKS_PASSWORD must be set for OwnTracks Basic Auth}"
      OWNTRACKS_ENCRYPTION_KEY: "${OWNTRACKS_ENCRYPTION_KEY:?OWNTRACKS_ENCRYPTION_KEY must be set for OwnTracks payload encryption}"
      OWNTRACKS_SYNC_WAYPOINTS: "${OWNTRACKS_SYNC_WAYPOINTS:-true}"
      OWNTRACKS_DEFAULT_SITE_RADIUS_M: "${OWNTRACKS_DEFAULT_SITE_RADIUS_M:-150}"
      AUTOMATIC_TRIP_PROCESSING_ENABLED: "${AUTOMATIC_TRIP_PROCESSING_ENABLED:-true}"
      AUTOMATIC_TRIP_PROCESSING_INTERVAL_SECONDS: "${AUTOMATIC_TRIP_PROCESSING_INTERVAL_SECONDS:-60}"
      OWNTRACKS_PURGE_ENABLED: "${OWNTRACKS_PURGE_ENABLED:-true}"
      OWNTRACKS_LOCATION_RETENTION_DAYS: "${OWNTRACKS_LOCATION_RETENTION_DAYS:-90}"
      OWNTRACKS_WAYPOINT_DWELL_MINUTES: "${OWNTRACKS_WAYPOINT_DWELL_MINUTES:-5}"
      OWNTRACKS_TRAVEL_DISTANCE_M: "${OWNTRACKS_TRAVEL_DISTANCE_M:-50.0}"
      MQTT_ENABLED: "${MQTT_ENABLED:-false}"
      MQTT_HOST: "${MQTT_HOST:-localhost}"
      MQTT_PORT: "${MQTT_PORT:-1883}"
      MQTT_USERNAME: "${MQTT_USERNAME:-}"
      MQTT_PASSWORD: "${MQTT_PASSWORD:-}"
      MQTT_TOPIC: "${MQTT_TOPIC:-owntracks/#}"
      GAS_PRICE_STATE: "${GAS_PRICE_STATE:-MI}"
      GAS_PRICE_BUFFER: "${GAS_PRICE_BUFFER:-0.50}"
      GAS_PRICE_SOURCE: "${GAS_PRICE_SOURCE:-aaa_current}"
      EIA_API_KEY: "${EIA_API_KEY:-}"
      EIA_SERIES_ID: "${EIA_SERIES_ID:-}"
      VEHICLE_MPG: "${VEHICLE_MPG:-25.0}"
      GAS_SNAPSHOT_ENABLED: "${GAS_SNAPSHOT_ENABLED:-true}"
      GAS_SNAPSHOT_INTERVAL_SECONDS: "${GAS_SNAPSHOT_INTERVAL_SECONDS:-86400}"
      GAS_SNAPSHOT_RUN_ON_STARTUP: "${GAS_SNAPSHOT_RUN_ON_STARTUP:-true}"
      LOG_DIR: /data/logs
      LOGIN_FAILURE_LOG_PATH: /data/logs/mileage-logger-login-failures.log
      MAX_BACKUP_RESTORE_BYTES: "${MAX_BACKUP_RESTORE_BYTES:-262144000}"
      AUTOMATIC_BACKUPS_ENABLED: "${AUTOMATIC_BACKUPS_ENABLED:-true}"
      AUTOMATIC_BACKUP_DIR: "${AUTOMATIC_BACKUP_DIR:-/data/logs/backups}"
    volumes:
      - ${HOST_LOG_DIR:-/var/log/mileage-logger}:/data/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HTTP_PORT:-80}:80"
    environment:
      WEB_ALLOWED_CIDRS: "${WEB_ALLOWED_CIDRS:-}"
      TZ: "${LOCAL_TIMEZONE:-America/Detroit}"
    depends_on:
      app:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TUNNEL_TOKEN:?CLOUDFLARED_TUNNEL_TOKEN must be set}"
      TUNNEL_LOGLEVEL: "${CLOUDFLARED_LOG_LEVEL:-info}"
      TUNNEL_METRICS: "${CLOUDFLARED_METRICS:-}"
      TUNNEL_TRANSPORT_PROTOCOL: "${CLOUDFLARED_TRANSPORT_PROTOCOL:-auto}"
      TZ: "${LOCAL_TIMEZONE:-America/Detroit}"
    depends_on:
      nginx:
        condition: service_started

volumes:
  postgres_data:
