<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>504 Gateway Timeout</title>
  <style>
    :root { color-scheme: dark; --bg:#11100e; --panel:#1b1915; --panel-2:#201e19; --line:#3b352b; --text:#f8f5ef; --muted:#b5aa9a; --blue:#3b82f6; --blue-dark:#1d4ed8; --gold:#e2ad45; }
    * { box-sizing: border-box; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; padding:24px; background:radial-gradient(circle at top, #1f2937 0, var(--bg) 42%); color:var(--text); font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height:1.5; }
    main { width:calc(100vw - 48px); max-width:760px; border:1px solid var(--line); border-radius:8px; background:linear-gradient(135deg, var(--panel), var(--panel-2)); box-shadow:0 22px 70px rgba(0,0,0,.42); padding:clamp(24px, 6vw, 52px); }
    .code { color:var(--gold); font-size:clamp(30px, 5.6vw, 42px); font-weight:900; text-transform:none; letter-spacing:0; line-height:.98; }
    h1 { margin:14px 0 12px; font-size:clamp(24px, 5vw, 36px); line-height:1.08; letter-spacing:0; }
    p { max-width:58ch; margin:0 0 16px; color:var(--muted); font-size:17px; }
    .actions { margin-top:30px; display:flex; flex-wrap:wrap; gap:12px; }
    a { display:inline-flex; align-items:center; min-height:42px; padding:9px 15px; border:1px solid rgba(147,197,253,.62); border-radius:7px; background:linear-gradient(180deg, var(--blue), var(--blue-dark)); color:#f8fbff; font-weight:800; text-decoration:none; box-shadow:0 7px 0 rgba(29,78,216,.18), 0 12px 24px rgba(29,78,216,.34); transition:filter 120ms ease, transform 120ms ease, box-shadow 120ms ease; }
    a:hover { filter:brightness(1.16); transform:translateY(-1px); }
    a:active { transform:translateY(3px); box-shadow:0 2px 0 rgba(29,78,216,.18), 0 6px 16px rgba(29,78,216,.34); }
  </style>
</head>
<body>
  <main>
    <div class="code">504 Gateway Timeout</div>
    <h1>The site took too long to respond.</h1>
    <p>The page could not load because part of the site took too long to answer. This can happen during a slow connection or a temporary service delay.</p>
    <p>Try again shortly, or return to the login page and continue from there.</p>
    <div class="actions"><a id="primary-action" href="/login">Back to login</a></div>
  </main>
  <script>
    const action = document.getElementById("primary-action");
    if (document.cookie.includes("mileage_logger_session=")) {
      action.href = "/";
      action.textContent = "Back to home";
    }
  </script>
</body>
</html>
