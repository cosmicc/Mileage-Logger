map $http_x_forwarded_proto $mileage_logger_forwarded_proto {
    default $scheme;
    http http;
    https https;
}

upstream mileage_logger_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 250m;

    error_page 400 /errors/400.html;
    error_page 401 /errors/401.html;
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 408 /errors/408.html;
    error_page 413 /errors/413.html;
    error_page 429 /errors/429.html;
    error_page 500 /errors/500.html;
    error_page 502 /errors/502.html;
    error_page 503 /errors/503.html;
    error_page 504 /errors/504.html;

    location ^~ /errors/ {
        root /usr/share/nginx/html;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location = /api/owntracks {
        limit_except POST {
            deny all;
        }
        proxy_pass http://mileage_logger_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $mileage_logger_forwarded_proto;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    location = /api/owntracks/ {
        limit_except POST {
            deny all;
        }
        proxy_pass http://mileage_logger_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $mileage_logger_forwarded_proto;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    location = /api/pub {
        limit_except POST {
            deny all;
        }
        proxy_pass http://mileage_logger_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $mileage_logger_forwarded_proto;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    location = /api/pub/ {
        limit_except POST {
            deny all;
        }
        proxy_pass http://mileage_logger_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $mileage_logger_forwarded_proto;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    location = /api {
        return 404;
    }

    location /api/ {
        return 404;
    }

    location = /openapi.json {
        return 404;
    }

    location ^~ /docs {
        return 404;
    }

    location ^~ /redoc {
        return 404;
    }

    location /static/ {
        include /etc/nginx/includes/web-access.conf;
        proxy_intercept_errors on;
        proxy_pass http://mileage_logger_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $mileage_logger_forwarded_proto;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    location / {
        include /etc/nginx/includes/web-access.conf;
        proxy_intercept_errors on;
        proxy_pass http://mileage_logger_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $mileage_logger_forwarded_proto;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }
}
