upstream mileage_logger_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 250m;

    location = /api/owntracks {
        limit_except POST {
            deny all;
        }
        proxy_pass http://mileage_logger_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/owntracks/ {
        limit_except POST {
            deny all;
        }
        proxy_pass http://mileage_logger_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/pub {
        limit_except POST {
            deny all;
        }
        proxy_pass http://mileage_logger_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/pub/ {
        limit_except POST {
            deny all;
        }
        proxy_pass http://mileage_logger_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api {
        return 404;
    }

    location /api/ {
        return 404;
    }

    location = /openapi.json {
        return 404;
    }

    location ^~ /docs {
        return 404;
    }

    location ^~ /redoc {
        return 404;
    }

    location /static/ {
        include /etc/nginx/includes/web-access.conf;
        proxy_pass http://mileage_logger_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        include /etc/nginx/includes/web-access.conf;
        proxy_pass http://mileage_logger_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
