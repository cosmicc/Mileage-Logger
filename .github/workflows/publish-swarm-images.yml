name: Build and publish Swarm images

on:
  push:
    branches:
      - main
    paths:
      - "mileage_logger/**"
      - "alembic/**"
      - "alembic.ini"
      - "scripts/**"
      - "deploy/nginx/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/publish-swarm-images.yml"

  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: mileage-logger-images-main
  cancel-in-progress: true

jobs:
  publish:
    name: Publish Docker images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: app
            dockerfile: ./Dockerfile
            image: ghcr.io/cosmicc/mileage-logger-app

          - component: nginx
            dockerfile: ./deploy/nginx/Dockerfile
            image: ghcr.io/cosmicc/mileage-logger-nginx

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read application version
        id: version
        shell: bash
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-,format=long

      - name: Build and publish ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
